<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="32" height="32" rx="7" ry="7"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="32" height="32" fill="#14162A"/>
    <polygon points="22,0 32,0 32,10" fill="#F5A623"/>
  </g>

  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.25" ry="6.25"
        fill="none" stroke="#2A2D4A" stroke-width="1"/>

  <!-- terminal prompt chevron -->
  <path d="M5 12 L9 16 L5 20"
        fill="none" stroke="#4DE8D0" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- vibe pulse -->
  <path d="M11 18 L14.5 10 L18 23 L21 13 L23.5 18"
        fill="none" stroke="#4DE8D0" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- blinking cursor -->
  <rect x="25.5" y="14" width="3" height="8" rx="1" fill="#F5A623"/>
</svg>
